name: Feature request
description: Suggest an enhancement to phi-chain.
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What are you trying to do that phi-chain does not yet support?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: The behaviour or API you would like. Consensus-/crypto-sensitive changes must cite a standard or audited reference.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
