name: Bug report
description: Report a defect in phi-chain (NOT a security vulnerability — see SECURITY.md).
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Do not report security vulnerabilities here. Follow SECURITY.md (security@portphi.com).
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal commands, transaction, or failing test that reproduces the problem.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / commit
      description: phid version, tag, or commit hash.
    validations:
      required: true
  - type: input
    id: env
    attributes:
      label: Environment
      description: OS, Go toolchain version, and how you built the binary (e.g. -tags pebbledb).
    validations:
      required: false
