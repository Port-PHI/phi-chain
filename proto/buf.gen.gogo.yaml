# Generate Go code with gogoproto — matching the Cosmos SDK v0.50 style.
# Output is relative to the chain root (out: ..), placed per each file's go_package.
version: v1
plugins:
  - name: gocosmos
    out: ..
    opt: plugins=grpc,Mgoogle/protobuf/any.proto=github.com/cosmos/cosmos-sdk/codec/types
  - name: grpc-gateway
    out: ..
    opt: logtostderr=true
