syntax = "proto3";
package phi.governance;

import "gogoproto/gogo.proto";
import "cosmos/msg/v1/msg.proto";
import "cosmos_proto/cosmos.proto";
import "amino/amino.proto";
import "phi/governance/governance.proto";

option go_package = "github.com/Port-PHI/phi-chain/x/governance/types";

// Msg service of the governance module.
service Msg {
  option (cosmos.msg.v1.service) = true;

  // UpdateParams replaces the message-type → vote-path table.
  //
  // THIS IS THE ANTI-CAPTURE ANCHOR. A proposal carrying this message is classified PUBLIC by a
  // fixed rule in the classifier, WITHOUT consulting the table — so validators cannot route a
  // change to the table through their own (technical) path, not even by first inserting this very
  // message type into the table as "technical". Changing that rule requires a software upgrade,
  // which is itself technical — and that is the intended, visible constitutional cost.
  rpc UpdateParams(MsgUpdateParams) returns (MsgUpdateParamsResponse);
}

// MsgUpdateParams — governance authority only. See the anti-capture note on the rpc above.
message MsgUpdateParams {
  option (cosmos.msg.v1.signer) = "authority";
  option (amino.name) = "phi/governance/MsgUpdateParams";

  string authority = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  Params params = 2 [(gogoproto.nullable) = false, (amino.dont_omitempty) = true];
}

message MsgUpdateParamsResponse {}
