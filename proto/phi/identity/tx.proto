syntax = "proto3";
package phi.identity;

import "gogoproto/gogo.proto";
import "cosmos/msg/v1/msg.proto";
import "cosmos_proto/cosmos.proto";
import "amino/amino.proto";
import "phi/identity/identity.proto";

option go_package = "github.com/Port-PHI/phi-chain/x/identity/types";

// Msg service of the identity module.
service Msg {
  option (cosmos.msg.v1.service) = true;

  // RegisterIdentity registers a Phi identity (DID); enforces DID uniqueness and the biometric marker.
  rpc RegisterIdentity(MsgRegisterIdentity) returns (MsgRegisterIdentityResponse);

  // RevokeIdentity revokes a DID (controller or governance).
  rpc RevokeIdentity(MsgRevokeIdentity) returns (MsgRevokeIdentityResponse);

  // RotateIdentityKey rotates a DID's passkey (controller only; proof-of-possession of the new key).
  rpc RotateIdentityKey(MsgRotateIdentityKey) returns (MsgRotateIdentityKeyResponse);

  // UpdateStatus suspends or reinstates a DID (ACTIVE↔SUSPENDED) — governance authority only.
  rpc UpdateStatus(MsgUpdateStatus) returns (MsgUpdateStatusResponse);

  // SetGuardians replaces a DID's social-recovery guardian commitment set (controller only).
  rpc SetGuardians(MsgSetGuardians) returns (MsgSetGuardiansResponse);

  // InitiateRecovery opens a SOCIAL recovery request, signed by the NEW key (proof-of-possession).
  rpc InitiateRecovery(MsgInitiateRecovery) returns (MsgInitiateRecoveryResponse);
  // ApproveRecovery records one guardian's approval, opening their commitment.
  rpc ApproveRecovery(MsgApproveRecovery) returns (MsgApproveRecoveryResponse);
  // RejectRecovery records one guardian's rejection; at the guardian threshold the request is REJECTED
  // and its slot freed.
  rpc RejectRecovery(MsgRejectRecovery) returns (MsgRejectRecoveryResponse);
  // ExecuteRecovery applies an authorised recovery — permissionless once threshold and delay are met.
  rpc ExecuteRecovery(MsgExecuteRecovery) returns (MsgExecuteRecoveryResponse);
  // CancelRecovery aborts a pending recovery — the current (old) controller's anti-hijack lever.
  rpc CancelRecovery(MsgCancelRecovery) returns (MsgCancelRecoveryResponse);

  // UpdateParams updates the module parameters — governance only.
  rpc UpdateParams(MsgUpdateParams) returns (MsgUpdateParamsResponse);

  // RegisterTrustedIssuer adds/updates a trusted identity issuer — governance only.
  rpc RegisterTrustedIssuer(MsgRegisterTrustedIssuer) returns (MsgRegisterTrustedIssuerResponse);
  // RevokeTrustedIssuer deactivates a trusted identity issuer — governance only.
  rpc RevokeTrustedIssuer(MsgRevokeTrustedIssuer) returns (MsgRevokeTrustedIssuerResponse);
}

// MsgRegisterIdentity registers a freshly verified identity. A trusted issuer must attest the
// registration (issuer_sig) and the registrant must prove possession of pub_key (pop_sig); both
// signatures cover the canonical attestation message and are verified on-chain (fail-closed).
message MsgRegisterIdentity {
  option (cosmos.msg.v1.signer) = "creator";
  option (amino.name) = "phi/identity/MsgRegisterIdentity";

  // Signer address (DID controller)
  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  // Unique Phi identity — must be the canonical derivation of pub_key (did:phi:<hex(sha256(0x02‖uncompressed-SEC1(pk)))>, full 32-byte digest)
  string did = 2;
  // P-256 public key (passkey)
  bytes pub_key = 3;
  // Biometric uniqueness marker hash — never raw data
  bytes uniqueness_hash = 4;
  // DID of the trusted identity issuer (TrustedIssuer)
  string issuer_did = 5;
  // Issuer signature (P-256) over the canonical attestation message
  bytes issuer_sig = 6;
  // Anti-replay nonce binding the attestation to this single registration
  bytes nonce = 7;
  // Proof-of-possession: signature by pub_key over the same canonical attestation message, on the
  // curve named by key_type
  bytes pop_sig = 8;
  // Curve of pub_key: SECP256R1 (default — a device passkey) or SECP256K1 (the opt-in self-custody
  // path, key derived from a BIP-39 recovery phrase). It selects BOTH the DID derivation tag and the
  // curve the proof-of-possession is verified on, so it is bound into the identity, not a hint.
  // Omitted (UNSPECIFIED) means SECP256R1, which is what every pre-existing client sends.
  KeyType key_type = 9;
}

message MsgRegisterIdentityResponse {}

// MsgRotateIdentityKey rotates the passkey of an existing DID. Signer must be the current controller;
// pop_sig proves possession of new_pub_key over the canonical rotation message. The DID identifier and
// the uniqueness marker are preserved.
message MsgRotateIdentityKey {
  option (cosmos.msg.v1.signer) = "creator";
  option (amino.name) = "phi/identity/MsgRotateIdentityKey";

  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string did = 2;
  bytes  new_pub_key = 3;
  // Proof-of-possession: signature by new_pub_key over the canonical rotation message
  bytes  pop_sig = 4;
}

message MsgRotateIdentityKeyResponse {}

// MsgUpdateStatus suspends or reinstates a DID (ACTIVE↔SUSPENDED) — governance authority only. It is
// the "legal suspension" lever applied at the state layer. Revocation stays MsgRevokeIdentity:
// REVOKED is terminal and can neither be reached nor left through this message.
message MsgUpdateStatus {
  option (cosmos.msg.v1.signer) = "authority";
  option (amino.name) = "phi/identity/MsgUpdateStatus";

  // Governance address (usually the gov module)
  string authority = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  // Target DID
  string did = 2;
  // New status — must be ACTIVE or SUSPENDED
  DIDStatus new_status = 3;
}

message MsgUpdateStatusResponse {}

// MsgSetGuardians replaces (never merges) a DID's social-recovery guardian COMMITMENT set. The signer
// must be the DID's current controller and the DID must be ACTIVE. Commitments are computed
// client-side as SHA256("phi-guardian-commit-v1" ‖ 0x00 ‖ guardian_did ‖ 0x00 ‖ salt); the chain never
// sees the guardian DIDs or the salts, so guardian eligibility is enforced at APPROVAL time instead.
// Bounds still hold on chain: commitments are 32 bytes, distinct, and
// 1 <= threshold <= len(commitments) <= max_guardians.
message MsgSetGuardians {
  option (cosmos.msg.v1.signer) = "controller";
  option (amino.name) = "phi/identity/MsgSetGuardians";

  // Signer — must be the DID's current controller
  string controller = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  // The DID whose guardian set is being replaced
  string did = 2;
  // Guardian commitments, 32 bytes each (full replace)
  repeated bytes commitments = 3;
  // Approvals required to recover
  uint32 threshold = 4;
}

message MsgSetGuardiansResponse {}

// MsgInitiateRecovery opens a recovery request for a DID whose key was lost. It is signed by the
// account of the NEW key, which proves possession of that key via pop_sig; the signer is locked in as
// the DID's controller-to-be, because MsgExecuteRecovery is permissionless and its sender must not be
// able to redirect the identity.
//
// SOCIAL escrows the governed deposit and is authorised later by a guardian threshold. REAUTH carries
// its authorisation with it — a trusted issuer's attestation that the SAME human re-authenticated —
// pays a non-refundable fee instead of a deposit, and is rejected outright unless the binary was built
// with -tags reauth (keeper.ReauthRecoveryEnabled; fail-closed by default).
message MsgInitiateRecovery {
  option (cosmos.msg.v1.signer) = "creator";
  option (amino.name) = "phi/identity/MsgInitiateRecovery";

  // Signer — the NEW key's account; becomes the DID's controller on execute
  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  // The DID being recovered (must exist and be ACTIVE)
  string did = 2;
  // The key that will replace the DID's pub_key
  bytes proposed_new_pub_key = 3;
  // Curve of proposed_new_pub_key (SECP256R1 only in this slice)
  KeyType key_type = 4;
  // Authorisation method: SOCIAL (guardian threshold) or REAUTH (issuer attestation)
  RecoveryMethod method = 5;
  // Single-use anti-replay nonce (per DID; shared registry across both methods)
  bytes nonce = 6;
  // Proof-of-possession: signature by proposed_new_pub_key over the canonical message
  // frame("phi-social-recovery-v3", chain_id, did, proposed_new_pub_key, creator, nonce), where
  // frame(...) prefixes the domain and every field with its u32 big-endian length.
  // Required for BOTH methods: a compromised attestor alone must not be able to install a key nobody holds.
  bytes pop_sig = 7;
  // REAUTH only (must be empty for SOCIAL): the attestor's P-256 signature over the canonical message
  // frame("phi-recovery-reauth-v3", chain_id, did, proposed_new_pub_key, proposed_new_controller,
  // uniqueness_hash, nonce) — where uniqueness_hash is the DID's OWN marker, which the
  // chain reads from the DID document and never accepts from this message. That binding is the
  // anti-Sybil crux: it proves the re-authenticated human is the same human the DID belongs to.
  bytes reauth_attestation = 8;
  // REAUTH only (must be empty for SOCIAL): the TrustedIssuer DID that produced reauth_attestation. It
  // must be registered AND active at initiate.
  string attestor_did = 9;
}

message MsgInitiateRecoveryResponse {
  // The opened request's id
  bytes recovery_id = 1;
}

// MsgApproveRecovery records one guardian's approval. The guardian OPENS their commitment by revealing
// (guardian_did, salt); the chain re-derives SHA256(domain ‖ guardian_did ‖ salt) and checks it is in
// the protected DID's stored commitment set. The revealed guardian must be an ACTIVE DID (checked HERE,
// not at set time) and the signer must control it — otherwise a third party could replay a
// publicly-revealed opening as their own approval.
message MsgApproveRecovery {
  option (cosmos.msg.v1.signer) = "creator";
  option (amino.name) = "phi/identity/MsgApproveRecovery";

  // Signer — must be the controller of guardian_did
  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  // The request being approved
  bytes recovery_id = 2;
  // The approving guardian's DID (revealed now)
  string guardian_did = 3;
  // The 32-byte salt that opens this guardian's commitment
  bytes salt = 4;
}

message MsgApproveRecoveryResponse {}

// MsgRejectRecovery records one guardian's rejection of an open SOCIAL request. Membership is proven
// exactly as MsgApproveRecovery proves it — by OPENING the commitment with (guardian_did, salt) — and
// the same eligibility rules apply: the revealed guardian must be an ACTIVE DID and the signer must
// control it.
//
// On reaching the DID's guardian threshold the request becomes REJECTED and its deposit is forfeited to
// the fee collector, freeing the slot. This is what makes the per-DID slot cap unexhaustible: a griefer
// who fills every slot with spurious requests can be cleared by the guardians instead of the DID being
// blocked until TTL — and the users that would lock out are exactly the lost-key owners recovery exists
// to serve.
//
// The threshold (not a single guardian) is deliberate and grants no new power: any set of guardians
// large enough to reject could equally have blocked the recovery by withholding approval.
message MsgRejectRecovery {
  option (cosmos.msg.v1.signer) = "creator";
  option (amino.name) = "phi/identity/MsgRejectRecovery";

  // Signer — must be the controller of guardian_did
  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  // The request being rejected
  bytes recovery_id = 2;
  // The rejecting guardian's DID (revealed now)
  string guardian_did = 3;
  // The 32-byte salt that opens this guardian's commitment
  bytes salt = 4;
}

message MsgRejectRecoveryResponse {}

// MsgExecuteRecovery applies an authorised recovery. PERMISSIONLESS: anyone may crank it once the
// threshold is met and the opposition window has elapsed — it carries no authority, it only applies a
// decision already made by the guardians and un-opposed by the controller. Refunds the deposit to the
// initiator.
message MsgExecuteRecovery {
  option (cosmos.msg.v1.signer) = "creator";
  option (amino.name) = "phi/identity/MsgExecuteRecovery";

  // Signer — anyone (the crank)
  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  // The request to execute
  bytes recovery_id = 2;
}

message MsgExecuteRecoveryResponse {}

// MsgCancelRecovery aborts a pending recovery. Signed by the DID's CURRENT (old) controller: the true
// owner, still holding the old key, vetoing a hijack inside the opposition window. The deposit is
// forfeited to the fee collector.
message MsgCancelRecovery {
  option (cosmos.msg.v1.signer) = "creator";
  option (amino.name) = "phi/identity/MsgCancelRecovery";

  // Signer — must be the DID's current controller
  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  // The request to cancel
  bytes recovery_id = 2;
}

message MsgCancelRecoveryResponse {}

// MsgRevokeIdentity revokes a DID.
message MsgRevokeIdentity {
  option (cosmos.msg.v1.signer) = "creator";
  option (amino.name) = "phi/identity/MsgRevokeIdentity";

  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string did = 2;
}

message MsgRevokeIdentityResponse {}

// MsgUpdateParams updates the module parameters — governance authority only.
message MsgUpdateParams {
  option (cosmos.msg.v1.signer) = "authority";
  option (amino.name) = "phi/identity/MsgUpdateParams";

  // Governance address (usually the gov module)
  string authority = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  // New parameters
  Params params = 2 [(gogoproto.nullable) = false, (amino.dont_omitempty) = true];
}

message MsgUpdateParamsResponse {}

// MsgRegisterTrustedIssuer registers (or updates) a trusted identity issuer — governance authority only.
message MsgRegisterTrustedIssuer {
  option (cosmos.msg.v1.signer) = "authority";
  option (amino.name) = "phi/identity/MsgRegisterTrustedIssuer";

  string authority = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  TrustedIssuer issuer = 2 [(gogoproto.nullable) = false];
}

message MsgRegisterTrustedIssuerResponse {}

// MsgRevokeTrustedIssuer deactivates a trusted identity issuer — governance authority only.
message MsgRevokeTrustedIssuer {
  option (cosmos.msg.v1.signer) = "authority";
  option (amino.name) = "phi/identity/MsgRevokeTrustedIssuer";

  string authority = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string did = 2;
}

message MsgRevokeTrustedIssuerResponse {}
