syntax = "proto3";
package phi.coin;

import "gogoproto/gogo.proto";
import "cosmos/msg/v1/msg.proto";
import "cosmos_proto/cosmos.proto";
import "amino/amino.proto";
import "phi/coin/coin.proto";

option go_package = "github.com/Port-PHI/phi-chain/x/coin/types";

// Msg service of the coin module.
service Msg {
  option (cosmos.msg.v1.service) = true;

  // Transfer moves uphi, applying the stepped coin-age burn.
  rpc Transfer(MsgTransfer) returns (MsgTransferResponse);

  // UpdateParams updates the economic parameters — only via governance.
  rpc UpdateParams(MsgUpdateParams) returns (MsgUpdateParamsResponse);

  // WithdrawRevenue moves accrued revenue out of phi_revenue — only via governance.
  rpc WithdrawRevenue(MsgWithdrawRevenue) returns (MsgWithdrawRevenueResponse);
}

// MsgTransfer transfers PHI coin (uphi). The fixed fee is deducted in the AnteHandler;
// here only the transfer plus the stepped coin-age burn are applied.
message MsgTransfer {
  option (cosmos.msg.v1.signer) = "from";
  option (amino.name) = "phi/coin/MsgTransfer";

  string from = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string to = 2 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  // Amount (uphi)
  string amount = 3;
}

message MsgTransferResponse {
  // Amount actually burned (uphi)
  string burned = 1;
}

// MsgUpdateParams — governance authority only.
message MsgUpdateParams {
  option (cosmos.msg.v1.signer) = "authority";
  option (amino.name) = "phi/coin/MsgUpdateParams";

  string authority = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  Params params = 2 [(gogoproto.nullable) = false, (amino.dont_omitempty) = true];
}

message MsgUpdateParamsResponse {}

// MsgWithdrawRevenue transfers accrued revenue from the keyless phi_revenue module account to
// params.company_payout_address — governance authority only. It is a plain bank send of coins that
// already exist and are already vault-backed: it never mints, so supply is unchanged.
message MsgWithdrawRevenue {
  option (cosmos.msg.v1.signer) = "authority";
  option (amino.name) = "phi/coin/MsgWithdrawRevenue";

  string authority = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  // Amount (uphi)
  string amount = 2;
}

message MsgWithdrawRevenueResponse {}
