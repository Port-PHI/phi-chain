syntax = "proto3";
package phi.coin;

import "gogoproto/gogo.proto";
import "phi/coin/coin.proto";

option go_package = "github.com/Port-PHI/phi-chain/x/coin/types";

// StoreEntry is one raw key/value record under a module store prefix. It round-trips the daily
// micro-exemption quota counters, which are pure KV counters with no other structured representation;
// exporting the exact bytes guarantees an exact import.
message StoreEntry {
  bytes key = 1;
  bytes value = 2;
}

// GenesisState is the initial state of the coin module.
message GenesisState {
  Params params = 1 [(gogoproto.nullable) = false];
  // Initial coin-age lot queues
  repeated CoinAge coin_ages = 2 [(gogoproto.nullable) = false];
  // Daily micro-exemption quota counters, round-tripped verbatim. Without these an export→import
  // returns every address's spent daily fee exemption on the day of the restart.
  repeated StoreEntry store_entries = 3 [(gogoproto.nullable) = false];
}
