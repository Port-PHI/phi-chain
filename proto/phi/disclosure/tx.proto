syntax = "proto3";
package phi.disclosure;

import "gogoproto/gogo.proto";
import "cosmos/msg/v1/msg.proto";
import "cosmos_proto/cosmos.proto";
import "amino/amino.proto";
import "phi/disclosure/disclosure.proto";

option go_package = "github.com/Port-PHI/phi-chain/x/disclosure/types";

// Msg is the disclosure module message service. Verification itself is a query
// (read-only); the only message is the governance parameter update.
service Msg {
  option (cosmos.msg.v1.service) = true;

  // UpdateParams updates module parameters — governance only.
  rpc UpdateParams(MsgUpdateParams) returns (MsgUpdateParamsResponse);
}

// MsgUpdateParams updates module parameters — governance only.
message MsgUpdateParams {
  option (cosmos.msg.v1.signer) = "authority";
  option (amino.name) = "phi/disclosure/MsgUpdateParams";

  // Governance authority (usually the gov module).
  string authority = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  // New parameters.
  Params params = 2 [(gogoproto.nullable) = false, (amino.dont_omitempty) = true];
}

message MsgUpdateParamsResponse {}
