syntax = "proto3";
package phi.voting;

import "gogoproto/gogo.proto";
import "cosmos/msg/v1/msg.proto";
import "cosmos_proto/cosmos.proto";
import "amino/amino.proto";
import "phi/voting/voting.proto";

option go_package = "github.com/Port-PHI/phi-chain/x/voting/types";

// Msg is the voting module message service.
service Msg {
  option (cosmos.msg.v1.service) = true;

  // CreateElection opens a new poll gated by a credential template.
  rpc CreateElection(MsgCreateElection) returns (MsgCreateElectionResponse);
  // CastVote casts an anonymous, eligibility-proven, nullifier-deduplicated ballot.
  rpc CastVote(MsgCastVote) returns (MsgCastVoteResponse);
  // CloseElection closes a poll early (creator only).
  rpc CloseElection(MsgCloseElection) returns (MsgCloseElectionResponse);
  // CancelElection cancels a poll before any vote (creator only).
  rpc CancelElection(MsgCancelElection) returns (MsgCancelElectionResponse);
  // UpdateParams updates module parameters — governance only.
  rpc UpdateParams(MsgUpdateParams) returns (MsgUpdateParamsResponse);
}

// MsgCreateElection opens a poll.
message MsgCreateElection {
  option (cosmos.msg.v1.signer) = "creator";
  option (amino.name) = "phi/voting/MsgCreateElection";

  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  // Unique election id.
  string id = 2;
  // Question/title.
  string title = 3;
  // Choice labels (at least two).
  repeated string options = 4;
  // Credential template that gates eligibility.
  string required_template_id = 5;
  // Expected issuer DID of that template.
  string required_issuer_did = 6;
  // Voting window (Unix seconds); 0 start means "open immediately".
  int64 voting_start = 7;
  int64 voting_end = 8;
}

message MsgCreateElectionResponse {}

// MsgCastVote casts an anonymous ballot.
//
// The signer (voter) is only the transaction fee payer — it is NOT the voter's
// identity and is not linked to the ballot; anonymity relies on using a relayer/
// throwaway account plus the identity-revealing-nothing BBS+ proof. The chain
// verifies eligibility_proof against the template issuer key with the bound nonce
// SHA256(election_id ‖ nullifier), then deduplicates the nullifier.
message MsgCastVote {
  option (cosmos.msg.v1.signer) = "voter";
  option (amino.name) = "phi/voting/MsgCastVote";

  // Transaction fee payer (relayer/throwaway) — not the voter identity.
  string voter = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  // Election being voted in.
  string election_id = 2;
  // Per-election nullifier (one-vote-per-nullifier).
  bytes nullifier = 3;
  // Serialized BBS+ selective-disclosure proof of eligibility (verified, not stored).
  bytes eligibility_proof = 4;
  // Chosen option index into the election's options.
  uint32 option_index = 5;
}

message MsgCastVoteResponse {}

// MsgCloseElection closes a poll early (creator only).
message MsgCloseElection {
  option (cosmos.msg.v1.signer) = "creator";
  option (amino.name) = "phi/voting/MsgCloseElection";

  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string election_id = 2;
}

message MsgCloseElectionResponse {}

// MsgCancelElection cancels a poll before any vote (creator only).
message MsgCancelElection {
  option (cosmos.msg.v1.signer) = "creator";
  option (amino.name) = "phi/voting/MsgCancelElection";

  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string election_id = 2;
}

message MsgCancelElectionResponse {}

// MsgUpdateParams updates module parameters — governance only.
message MsgUpdateParams {
  option (cosmos.msg.v1.signer) = "authority";
  option (amino.name) = "phi/voting/MsgUpdateParams";

  string authority = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  Params params = 2 [(gogoproto.nullable) = false, (amino.dont_omitempty) = true];
}

message MsgUpdateParamsResponse {}
