syntax = "proto3";
package phi.credentials;

import "gogoproto/gogo.proto";
import "cosmos/msg/v1/msg.proto";
import "cosmos_proto/cosmos.proto";
import "amino/amino.proto";
import "phi/credentials/credentials.proto";

option go_package = "github.com/Port-PHI/phi-chain/x/credentials/types";

// Msg is the credentials module message service.
service Msg {
  option (cosmos.msg.v1.service) = true;

  // RegisterCredentialTemplate registers a new credential template (version 1).
  rpc RegisterCredentialTemplate(MsgRegisterCredentialTemplate) returns (MsgRegisterCredentialTemplateResponse);
  // UpdateCredentialTemplate bumps a template's version and schema hash.
  rpc UpdateCredentialTemplate(MsgUpdateCredentialTemplate) returns (MsgUpdateCredentialTemplateResponse);
  // DeprecateCredentialTemplate marks a template deprecated (rejects new anchors).
  rpc DeprecateCredentialTemplate(MsgDeprecateCredentialTemplate) returns (MsgDeprecateCredentialTemplateResponse);

  // AnchorCredential anchors an off-chain verifiable credential; the issuer
  // signature over the credential hash is verified via phi-crypto.
  rpc AnchorCredential(MsgAnchorCredential) returns (MsgAnchorCredentialResponse);
  // RevokeCredential revokes a previously anchored credential (issuer only).
  rpc RevokeCredential(MsgRevokeCredential) returns (MsgRevokeCredentialResponse);

  // CreateAgreement creates a multi-party agreement awaiting signatures.
  rpc CreateAgreement(MsgCreateAgreement) returns (MsgCreateAgreementResponse);
  // SignAgreement records a required signer's signature over the agreement hash.
  rpc SignAgreement(MsgSignAgreement) returns (MsgSignAgreementResponse);
  // CancelAgreement cancels a pending agreement (creator only).
  rpc CancelAgreement(MsgCancelAgreement) returns (MsgCancelAgreementResponse);

  // AnchorPersonal anchors a self-signed salted hash for its owner (personal vault).
  rpc AnchorPersonal(MsgAnchorPersonal) returns (MsgAnchorPersonalResponse);

  // UpdateParams updates module parameters — governance only.
  rpc UpdateParams(MsgUpdateParams) returns (MsgUpdateParamsResponse);
}

// MsgRegisterCredentialTemplate registers a template owned by owner_did.
message MsgRegisterCredentialTemplate {
  option (cosmos.msg.v1.signer) = "creator";
  option (amino.name) = "phi/credentials/MsgRegisterCredentialTemplate";

  // Signer; must control owner_did.
  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  // Template id, e.g. "phi.kyc.v1".
  string id = 2;
  // Issuer DID that owns the template.
  string owner_did = 3;
  // Hash of the off-chain JSON schema.
  bytes schema_hash = 4;
  // Human-readable label.
  string name = 5;
  // Issuer BBS+ public key for disclosure verification (optional; empty = none).
  // Set once here and immutable thereafter (see MsgUpdateCredentialTemplate).
  bytes issuer_bbs_pubkey = 6;
  // Number of claims (BBS+ messages) a credential of this template carries.
  uint32 message_count = 7;
  // The only message indices a holder may ever reveal (the disclosure policy). Empty means nothing may
  // be revealed: holders can still prove predicates (L1), but no raw claim can leave the credential.
  repeated uint32 disclosable_indices = 8;
}

message MsgRegisterCredentialTemplateResponse {
  // The canonical disclosure-policy hash the chain computed for this template. A verifier pins it to
  // bind a later verification to exactly this policy version.
  bytes disclosure_policy_hash = 1;
}

// MsgUpdateCredentialTemplate updates a template (owner only); version is bumped.
message MsgUpdateCredentialTemplate {
  option (cosmos.msg.v1.signer) = "creator";
  option (amino.name) = "phi/credentials/MsgUpdateCredentialTemplate";

  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string id = 2;
  // New schema hash.
  bytes schema_hash = 3;
  // New label.
  string name = 4;
  // Note: issuer_bbs_pubkey is intentionally NOT updatable — it is set once at
  // registration and immutable, so credentials anchored against any version of
  // this template keep verifying against the same key. Rotate by registering a
  // new template id.

  // New claim count and disclosure policy. Unlike the BBS+ key these ARE updatable — an issuer must be
  // able to narrow (or widen) what its credentials may reveal — and every update bumps the version and
  // re-derives disclosure_policy_hash, so a verifier pinned to the old policy stops verifying rather
  // than silently falling under the new one.
  uint32 message_count = 5;
  repeated uint32 disclosable_indices = 6;
}

message MsgUpdateCredentialTemplateResponse {
  // Resulting version after the bump.
  uint32 version = 1;
  // The re-derived disclosure-policy hash (the old one is now stale by construction).
  bytes disclosure_policy_hash = 2;
}

// MsgDeprecateCredentialTemplate marks a template deprecated (owner only).
message MsgDeprecateCredentialTemplate {
  option (cosmos.msg.v1.signer) = "creator";
  option (amino.name) = "phi/credentials/MsgDeprecateCredentialTemplate";

  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string id = 2;
}

message MsgDeprecateCredentialTemplateResponse {}

// MsgAnchorCredential anchors an off-chain verifiable credential.
message MsgAnchorCredential {
  option (cosmos.msg.v1.signer) = "issuer";
  option (amino.name) = "phi/credentials/MsgAnchorCredential";

  // Signer; must control issuer_did.
  string issuer = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  // Issuer DID.
  string issuer_did = 2;
  // Subject (holder) DID.
  string subject_did = 3;
  // Template the credential is issued against (must be ACTIVE).
  string template_id = 4;
  // Template version the credential was issued against (must match the current version).
  uint32 template_version = 5;
  // Hash of the off-chain verifiable credential.
  bytes credential_hash = 6;
  // Issuer signature over credential_hash (verified via phi-crypto, then discarded).
  bytes issuer_sig = 7;
}

message MsgAnchorCredentialResponse {}

// MsgRevokeCredential revokes a previously anchored credential.
message MsgRevokeCredential {
  option (cosmos.msg.v1.signer) = "issuer";
  option (amino.name) = "phi/credentials/MsgRevokeCredential";

  // Signer; must control the credential's issuer_did.
  string issuer = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  // Hash of the credential to revoke.
  bytes credential_hash = 2;
}

message MsgRevokeCredentialResponse {}

// MsgCreateAgreement creates a multi-party agreement.
message MsgCreateAgreement {
  option (cosmos.msg.v1.signer) = "creator";
  option (amino.name) = "phi/credentials/MsgCreateAgreement";

  // Creator (bech32 address).
  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  // Hash of the off-chain agreement document.
  bytes hash = 2;
  // Signer DIDs that must all sign.
  repeated string required_signers = 3;
  // Signing deadline (Unix seconds); 0 means no deadline.
  int64 deadline = 4;
}

message MsgCreateAgreementResponse {}

// MsgSignAgreement records a required signer's signature over the agreement hash.
message MsgSignAgreement {
  option (cosmos.msg.v1.signer) = "signer";
  option (amino.name) = "phi/credentials/MsgSignAgreement";

  // Signer; must control signer_did.
  string signer = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  // Agreement hash being signed.
  bytes hash = 2;
  // Signer DID (must be in the agreement's required_signers).
  string signer_did = 3;
  // Signature over hash (verified via phi-crypto, then discarded).
  bytes signature = 4;
}

message MsgSignAgreementResponse {
  // True if this signature completed the agreement.
  bool completed = 1;
}

// MsgCancelAgreement cancels a pending agreement (creator only).
message MsgCancelAgreement {
  option (cosmos.msg.v1.signer) = "creator";
  option (amino.name) = "phi/credentials/MsgCancelAgreement";

  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  // Agreement hash to cancel.
  bytes hash = 2;
}

message MsgCancelAgreementResponse {}

// MsgAnchorPersonal anchors a self-signed salted hash for its owner.
message MsgAnchorPersonal {
  option (cosmos.msg.v1.signer) = "owner";
  option (amino.name) = "phi/credentials/MsgAnchorPersonal";

  // Signer; must control owner_did.
  string owner = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  // Owner DID.
  string owner_did = 2;
  // Salted self-signed hash.
  bytes anchor_hash = 3;
  // Owner signature over anchor_hash (verified via phi-crypto, then discarded).
  bytes signature = 4;
}

message MsgAnchorPersonalResponse {}

// MsgUpdateParams updates module parameters — governance only.
message MsgUpdateParams {
  option (cosmos.msg.v1.signer) = "authority";
  option (amino.name) = "phi/credentials/MsgUpdateParams";

  // Governance authority (usually the gov module).
  string authority = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  // New parameters.
  Params params = 2 [(gogoproto.nullable) = false, (amino.dont_omitempty) = true];
}

message MsgUpdateParamsResponse {}
