syntax = "proto3";
package phi.credentials;

import "gogoproto/gogo.proto";
import "amino/amino.proto";

option go_package = "github.com/Port-PHI/phi-chain/x/credentials/types";

// TemplateStatus is the lifecycle state of a credential template.
enum TemplateStatus {
  option (gogoproto.goproto_enum_prefix) = false;

  TEMPLATE_STATUS_UNSPECIFIED = 0; // unset
  TEMPLATE_STATUS_ACTIVE      = 1; // accepts new anchors
  TEMPLATE_STATUS_DEPRECATED  = 2; // rejects new anchors
}

// CredentialStatus is the lifecycle state of an anchored credential.
enum CredentialStatus {
  option (gogoproto.goproto_enum_prefix) = false;

  CREDENTIAL_STATUS_UNSPECIFIED = 0; // unset
  CREDENTIAL_STATUS_ACTIVE      = 1; // valid
  CREDENTIAL_STATUS_REVOKED     = 2; // revoked by the issuer
}

// AgreementStatus is the lifecycle state of a multi-party agreement.
enum AgreementStatus {
  option (gogoproto.goproto_enum_prefix) = false;

  AGREEMENT_STATUS_UNSPECIFIED = 0; // unset
  AGREEMENT_STATUS_PENDING     = 1; // awaiting signatures
  AGREEMENT_STATUS_COMPLETED   = 2; // all required signers signed (immutable)
  AGREEMENT_STATUS_CANCELLED   = 3; // cancelled by the creator before completion
  AGREEMENT_STATUS_EXPIRED     = 4; // deadline passed before completion
}

// CredentialTemplate is the on-chain schema reference for a class of credentials.
// Hybrid delivery: the schema and credential content live off-chain; only the
// hash, version and owner are anchored on-chain.
message CredentialTemplate {
  // Template id (primary key), e.g. "phi.kyc.v1".
  string id = 1;
  // Version; increases by one on every update (version binding for anchors).
  uint32 version = 2;
  // Issuer DID that owns the template (only its controller may update/deprecate it).
  string owner_did = 3;
  // Hash of the off-chain JSON schema — never the schema body.
  bytes schema_hash = 4;
  // Issuer BBS+ public key (G2 point bytes) used by x/disclosure to verify
  // selective-disclosure proofs over credentials of this template. Empty if
  // the template's credentials are not BBS+ selectively disclosed. This is a
  // distinct key from the issuer DID's P-256 key used to authorize anchoring.
  // Set at registration and immutable across updates: one stable signing key
  // per template id, so anchors against any version verify against this key.
  bytes issuer_bbs_pubkey = 9;
  // Human-readable label.
  string name = 5;
  // Lifecycle status.
  TemplateStatus status = 6;
  // Creation time (Unix seconds).
  int64 created_at = 7;
  // Last update time (Unix seconds).
  int64 updated_at = 8;

  // --- Disclosure policy (what a holder of this credential may ever reveal) ---
  //
  // A BBS+ credential is a vector of claims; claim i is BBS+ message index i, in the order fixed by
  // the off-chain schema (schema_hash). The chain never sees field NAMES — the schema body is
  // off-chain — so the policy the chain can actually enforce is stated in message indices, and the
  // schema is what maps a name to an index.

  // Total number of claims (BBS+ messages) a credential of this template carries. A proof whose
  // message_count differs is a proof over a different credential shape and is rejected. 0 means the
  // issuer declared no policy: nothing may be revealed (L1 predicate proofs only).
  uint32 message_count = 10;
  // The ONLY message indices a holder may ever reveal. Any proof revealing an index outside this set
  // is rejected (fail-closed) — this is the issuer's promise that, say, the national-ID field of a KYC
  // credential can never be selectively disclosed, however the holder is asked or coerced.
  repeated uint32 disclosable_indices = 11;
  // Canonical hash binding (id, version, message_count, disclosable_indices) — computed by the chain,
  // never supplied by the issuer. A verifier pins it to check a proof against the exact policy version
  // it audited: if the issuer later widens the policy, the pinned hash no longer matches and the
  // verification is rejected rather than silently judged under new rules.
  bytes disclosure_policy_hash = 12;
}

// CredentialAnchor is the on-chain anchor of an off-chain verifiable credential.
// "Verify and forget": only the hash and issuer/subject/template binding are stored.
message CredentialAnchor {
  // Hash of the off-chain verifiable credential (primary key).
  bytes credential_hash = 1;
  // Template this credential was issued against.
  string template_id = 2;
  // Template version the credential was issued against (version binding).
  uint32 template_version = 3;
  // Issuer DID.
  string issuer_did = 4;
  // Subject (holder) DID.
  string subject_did = 5;
  // Anchoring time (Unix seconds).
  int64 issued_at = 6;
  // Lifecycle status.
  CredentialStatus status = 7;
}

// AgreementSignature records that a required signer has signed the agreement.
// The raw signature is verified at sign time and not persisted ("verify and forget").
message AgreementSignature {
  // Signer DID.
  string signer_did = 1;
  // Sign time (Unix seconds).
  int64 signed_at = 2;
}

// Agreement is a multi-party document anchored by hash and signed by a fixed
// set of DIDs. Only listed DIDs may sign; a completed agreement is immutable.
message Agreement {
  // Hash of the off-chain agreement document (primary key).
  bytes hash = 1;
  // Address that created the agreement (bech32).
  string creator = 2;
  // Signer DIDs that must all sign for the agreement to complete.
  repeated string required_signers = 3;
  // Signatures recorded so far.
  repeated AgreementSignature signatures = 4 [(gogoproto.nullable) = false];
  // Signing deadline (Unix seconds); 0 means no deadline.
  int64 deadline = 5;
  // Lifecycle status.
  AgreementStatus status = 6;
  // Creation time (Unix seconds).
  int64 created_at = 7;
}

// PersonalAnchor is a self-signed salted hash anchored by its owner (personal vault).
message PersonalAnchor {
  // Owner DID.
  string owner_did = 1;
  // Salted, self-signed hash — never the document body.
  bytes anchor_hash = 2;
  // Anchoring time (Unix seconds).
  int64 anchored_at = 3;
}

// Params are the credentials module parameters; changed only via governance.
message Params {
  option (amino.name) = "phi/x/credentials/Params";

  // Maximum number of required signers allowed on a single agreement (bounds state/gas).
  uint32 max_agreement_signers = 1;
}
