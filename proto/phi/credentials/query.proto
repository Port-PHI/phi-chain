syntax = "proto3";
package phi.credentials;

import "gogoproto/gogo.proto";
import "google/api/annotations.proto";
import "phi/credentials/credentials.proto";

option go_package = "github.com/Port-PHI/phi-chain/x/credentials/types";

// Query is the credentials module query service.
service Query {
  // Params returns the current module parameters.
  rpc Params(QueryParamsRequest) returns (QueryParamsResponse) {
    option (google.api.http).get = "/phi/credentials/params";
  }

  // Template returns a credential template by id.
  rpc Template(QueryTemplateRequest) returns (QueryTemplateResponse) {
    option (google.api.http).get = "/phi/credentials/templates/{id}";
  }

  // Credential returns a credential anchor by hex-encoded credential hash.
  rpc Credential(QueryCredentialRequest) returns (QueryCredentialResponse) {
    option (google.api.http).get = "/phi/credentials/credentials/{credential_hash_hex}";
  }

  // Agreement returns an agreement by hex-encoded hash.
  rpc Agreement(QueryAgreementRequest) returns (QueryAgreementResponse) {
    option (google.api.http).get = "/phi/credentials/agreements/{hash_hex}";
  }

  // PersonalAnchor returns a personal anchor by owner DID and hex-encoded hash.
  rpc PersonalAnchor(QueryPersonalAnchorRequest) returns (QueryPersonalAnchorResponse) {
    option (google.api.http).get = "/phi/credentials/personal/{owner_did}/{anchor_hash_hex}";
  }
}

message QueryParamsRequest {}
message QueryParamsResponse {
  Params params = 1 [(gogoproto.nullable) = false];
}

message QueryTemplateRequest {
  string id = 1;
}
message QueryTemplateResponse {
  CredentialTemplate template = 1 [(gogoproto.nullable) = false];
}

message QueryCredentialRequest {
  string credential_hash_hex = 1;
}
message QueryCredentialResponse {
  CredentialAnchor anchor = 1 [(gogoproto.nullable) = false];
}

message QueryAgreementRequest {
  string hash_hex = 1;
}
message QueryAgreementResponse {
  Agreement agreement = 1 [(gogoproto.nullable) = false];
}

message QueryPersonalAnchorRequest {
  string owner_did = 1;
  string anchor_hash_hex = 2;
}
message QueryPersonalAnchorResponse {
  PersonalAnchor anchor = 1 [(gogoproto.nullable) = false];
}
