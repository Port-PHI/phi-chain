syntax = "proto3";
package phi.credentials;

import "gogoproto/gogo.proto";
import "phi/credentials/credentials.proto";

option go_package = "github.com/Port-PHI/phi-chain/x/credentials/types";

// GenesisState is the credentials module genesis state.
message GenesisState {
  // Module parameters.
  Params params = 1 [(gogoproto.nullable) = false];
  // Credential templates.
  repeated CredentialTemplate templates = 2 [(gogoproto.nullable) = false];
  // Credential anchors.
  repeated CredentialAnchor anchors = 3 [(gogoproto.nullable) = false];
  // Agreements.
  repeated Agreement agreements = 4 [(gogoproto.nullable) = false];
  // Personal anchors.
  repeated PersonalAnchor personal_anchors = 5 [(gogoproto.nullable) = false];
}
