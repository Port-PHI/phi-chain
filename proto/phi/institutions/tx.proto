syntax = "proto3";
package phi.institutions;

import "gogoproto/gogo.proto";
import "cosmos/msg/v1/msg.proto";
import "cosmos_proto/cosmos.proto";
import "amino/amino.proto";
import "phi/institutions/institutions.proto";

option go_package = "github.com/Port-PHI/phi-chain/x/institutions/types";

// Message service of the financial-institution registry (multi-institution model).
service Msg {
  option (cosmos.msg.v1.service) = true;

  // RegisterInstitution adds an institution after the 6 criteria are met — operator/company only.
  rpc RegisterInstitution(MsgRegisterInstitution) returns (MsgRegisterInstitutionResponse);
  // RemoveInstitution removes after an orderly wind-down — operator/company only.
  rpc RemoveInstitution(MsgRemoveInstitution) returns (MsgRemoveInstitutionResponse);
  // InstitutionMint mints only against an attested deposit; conditioned on that institution's attested reserve.
  rpc InstitutionMint(MsgInstitutionMint) returns (MsgInstitutionMintResponse);
  // InstitutionRedeem burns/redeems; conditioned on vault_balance ≥ amount; no inter-institution settlement.
  rpc InstitutionRedeem(MsgInstitutionRedeem) returns (MsgInstitutionRedeemResponse);
  // PublishInstitutionAttestation publishes the live vault reserve/reconciliation attestation.
  rpc PublishInstitutionAttestation(MsgPublishInstitutionAttestation) returns (MsgPublishInstitutionAttestationResponse);
  // FreezeInstitution halts minting on reconciliation divergence — company/automated.
  rpc FreezeInstitution(MsgFreezeInstitution) returns (MsgFreezeInstitutionResponse);
  // UpdateParams — governance only.
  rpc UpdateParams(MsgUpdateParams) returns (MsgUpdateParamsResponse);
  // SetEmergencyRedemption activates/deactivates the network-wide stepped-redemption brake — governance only.
  rpc SetEmergencyRedemption(MsgSetEmergencyRedemption) returns (MsgSetEmergencyRedemptionResponse);

  // --- §13: institution panel and on-chain config (sensitive actions — multisig) ---

  // GrantInstitutionRole grants a sub-organization role (RBAC §13.1) — sensitive.
  rpc GrantInstitutionRole(MsgGrantInstitutionRole) returns (MsgGrantInstitutionRoleResponse);
  // RevokeInstitutionRole revokes a sub-organization role — sensitive.
  rpc RevokeInstitutionRole(MsgRevokeInstitutionRole) returns (MsgRevokeInstitutionRoleResponse);
  // UpdateInstitutionAppConfig toggles app services/widgets + the vault scan link (§13.2) — sensitive.
  rpc UpdateInstitutionAppConfig(MsgUpdateInstitutionAppConfig) returns (MsgUpdateInstitutionAppConfigResponse);
  // UpdateInstitutionParams operational parameters + risk rules (§13.3, only stricter) — sensitive.
  rpc UpdateInstitutionParams(MsgUpdateInstitutionParams) returns (MsgUpdateInstitutionParamsResponse);
  // SetInstitutionDepositKey sets the institution's P-256 deposit-signing key (provably-backed mint) — sensitive.
  rpc SetInstitutionDepositKey(MsgSetInstitutionDepositKey) returns (MsgSetInstitutionDepositKeyResponse);

  // --- fx institution onboarding (guarantor + public vote, §14 bootstrap) ---

  // RequestFxEntry: an exchange applies to join, naming an active financial guarantor.
  rpc RequestFxEntry(MsgRequestFxEntry) returns (MsgRequestFxEntryResponse);
  // GuaranteeFxEntry: the named financial institution's admin approves/declines the guarantee.
  rpc GuaranteeFxEntry(MsgGuaranteeFxEntry) returns (MsgGuaranteeFxEntryResponse);
  // FinalizeFxEntry: finalizes onboarding after a passed public vote (or direct operator add during bootstrap).
  rpc FinalizeFxEntry(MsgFinalizeFxEntry) returns (MsgFinalizeFxEntryResponse);
}

// MsgRegisterInstitution registers a new financial institution.
message MsgRegisterInstitution {
  option (cosmos.msg.v1.signer) = "operator";
  option (amino.name) = "phi/institutions/MsgRegisterInstitution";

  // operator/company (must match Params.operator)
  string operator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string id = 2;
  string license = 3;
  // institution admin address
  string admin = 4 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string vault_account = 5;
  string vault_api = 6;
  // performance bond (uphi)
  string bond = 7;
  // Institution category; empty/UNSPECIFIED registers as financial.
  InstitutionType institution_type = 8;
}

message MsgRegisterInstitutionResponse {}

// MsgRemoveInstitution removes an institution (after wind-down: vault_balance must be zero).
message MsgRemoveInstitution {
  option (cosmos.msg.v1.signer) = "operator";
  option (amino.name) = "phi/institutions/MsgRemoveInstitution";

  string operator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string id = 2;
}

message MsgRemoveInstitutionResponse {}

// MsgInstitutionMint mints against an attested deposit. The amount is in reserve Toman;
// minted uphi = amount_toman × (uphi_per_phi / phi_to_toman).
message MsgInstitutionMint {
  option (cosmos.msg.v1.signer) = "admin";
  option (amino.name) = "phi/institutions/MsgInstitutionMint";

  // institution admin (signer)
  string admin = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  // institution ID
  string institution = 2;
  // coin recipient address
  string recipient = 3 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  // deposited reserve amount (Toman)
  string amount_toman = 4;
  // proof of the attested bank deposit (hash/signature — not raw data)
  bytes deposit_proof = 5;
  // unique deposit ID (anti-replay/idempotency for the bank's automated system).
  // If non-empty, the chain rejects a duplicate mint of the same deposit (guards against double-mint on retry).
  string deposit_ref = 6;
  // fx provenance (fx institutions only): the off-chain asset converted to Rial before minting.
  // Provenance metadata only — the vault and accounting stay Rial; the solvency invariant is unchanged.
  string fx_currency = 7; // converted/received currency, e.g. "BTC"
  string fx_amount   = 8; // amount in fx_currency, e.g. "3"
  string fx_tx_ref   = 9; // source-network transaction reference (hash)
  // holder KYC tier asserted by the institution (off-chain) and carried in the deposit attestation.
  // When InstitutionParams.kyc_tier_limits has a matching tier, its daily_limit_toman is enforced.
  uint32 kyc_tier = 10;
}

message MsgInstitutionMintResponse {
  // minted uphi
  string minted_uphi = 1;
}

// MsgInstitutionRedeem redeems/burns. The amount is in Toman; burned uphi = amount_toman × 10.
message MsgInstitutionRedeem {
  option (cosmos.msg.v1.signer) = "admin";
  option (amino.name) = "phi/institutions/MsgInstitutionRedeem";

  string admin = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string institution = 2;
  // the holder whose coin is burned
  string holder = 3 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  // redeem amount (Toman)
  string amount_toman = 4;
  // unique redeem ID (anti-replay/idempotency for the bank's automated system).
  string redeem_ref = 5;
  // fx provenance (fx institutions only) — the off-chain asset paid out after the burn. See
  // MsgInstitutionMint. Provenance metadata only; the vault stays Rial and the invariant is unchanged.
  string fx_currency = 6;
  string fx_amount   = 7;
  string fx_tx_ref   = 8;
  // holder KYC tier (see MsgInstitutionMint.kyc_tier) — enforced against InstitutionParams.kyc_tier_limits.
  uint32 kyc_tier = 9;
}

message MsgInstitutionRedeemResponse {
  string burned_uphi = 1;
}

// MsgPublishInstitutionAttestation publishes the attested vault reserve (Toman).
message MsgPublishInstitutionAttestation {
  option (cosmos.msg.v1.signer) = "admin";
  option (amino.name) = "phi/institutions/MsgPublishInstitutionAttestation";

  string admin = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string institution = 2;
  // attested reserve (Toman)
  string attested_reserve = 3;
  // reconciliation report hash (off-chain)
  bytes report_hash = 4;
}

message MsgPublishInstitutionAttestationResponse {}

// MsgFreezeInstitution halts/resumes an institution's minting.
message MsgFreezeInstitution {
  option (cosmos.msg.v1.signer) = "operator";
  option (amino.name) = "phi/institutions/MsgFreezeInstitution";

  string operator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string id = 2;
  // true = freeze (halt minting), false = unfreeze
  bool frozen = 3;
}

message MsgFreezeInstitutionResponse {}

// MsgUpdateParams — governance authority only.
message MsgUpdateParams {
  option (cosmos.msg.v1.signer) = "authority";
  option (amino.name) = "phi/institutions/MsgUpdateParams";

  string authority = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  Params params = 2 [(gogoproto.nullable) = false, (amino.dont_omitempty) = true];
}

message MsgUpdateParamsResponse {}

// MsgSetEmergencyRedemption activates/deactivates the stepped-redemption brake. On activation the
// keeper stamps started_at = block time; empty cap fields fall back to the default caps. Governance
// authority only.
message MsgSetEmergencyRedemption {
  option (cosmos.msg.v1.signer) = "authority";
  option (amino.name) = "phi/institutions/MsgSetEmergencyRedemption";

  string authority = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  bool   active    = 2;
  // optional per-holder cumulative Toman cap overrides; empty keeps the default caps.
  string cap_before_day30 = 3;
  string cap_from_day30    = 4;
  string cap_from_day60    = 5;
}

message MsgSetEmergencyRedemptionResponse {}

// --- §13: sensitive actions (multisig — aggregated approval keyed by content hash) ---
//
// Each of these messages executes once the count of distinct inst_admin approvals over the same "content"
// reaches the threshold (sensitive_threshold, default 2). Anti-deadlock rule: effective threshold =
// min(threshold, number of inst_admins) — as long as there is one admin, a single signature executes immediately.
// The response fields indicate whether it executed or is still awaiting more signatures.

// MsgGrantInstitutionRole grants a role to an address (e.g. an automated service key). Signer = inst_admin.
message MsgGrantInstitutionRole {
  option (cosmos.msg.v1.signer) = "signer";
  option (amino.name) = "phi/institutions/MsgGrantInstitutionRole";

  string signer = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string institution = 2;
  string grantee = 3 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  InstitutionRole role = 4;
}

message MsgGrantInstitutionRoleResponse {
  bool executed    = 1; // true = threshold reached and executed; false = awaiting more signatures
  uint32 approvals = 2; // current approval count
  uint32 threshold = 3; // effective threshold
}

// MsgRevokeInstitutionRole revokes an address's role. Signer = inst_admin.
message MsgRevokeInstitutionRole {
  option (cosmos.msg.v1.signer) = "signer";
  option (amino.name) = "phi/institutions/MsgRevokeInstitutionRole";

  string signer = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string institution = 2;
  string grantee = 3 [(cosmos_proto.scalar) = "cosmos.AddressString"];
}

message MsgRevokeInstitutionRoleResponse {
  bool executed    = 1;
  uint32 approvals = 2;
  uint32 threshold = 3;
}

// MsgUpdateInstitutionAppConfig sets the app display config (§13.2). Signer = inst_admin.
message MsgUpdateInstitutionAppConfig {
  option (cosmos.msg.v1.signer) = "signer";
  option (amino.name) = "phi/institutions/MsgUpdateInstitutionAppConfig";

  string signer = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string institution = 2;
  InstitutionAppConfig config = 3 [(gogoproto.nullable) = false];
}

message MsgUpdateInstitutionAppConfigResponse {
  bool executed    = 1;
  uint32 approvals = 2;
  uint32 threshold = 3;
}

// MsgUpdateInstitutionParams sets parameters and risk rules (§13.3, only stricter). Signer = inst_admin.
message MsgUpdateInstitutionParams {
  option (cosmos.msg.v1.signer) = "signer";
  option (amino.name) = "phi/institutions/MsgUpdateInstitutionParams";

  string signer = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string institution = 2;
  InstitutionParams params = 3 [(gogoproto.nullable) = false];
}

message MsgUpdateInstitutionParamsResponse {
  bool executed    = 1;
  uint32 approvals = 2;
  uint32 threshold = 3;
}

// MsgSetInstitutionDepositKey sets the P-256 deposit-signing key (§4, provably-backed mint). Signer = inst_admin.
message MsgSetInstitutionDepositKey {
  option (cosmos.msg.v1.signer) = "signer";
  option (amino.name) = "phi/institutions/MsgSetInstitutionDepositKey";

  string signer = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string institution = 2;
  // P-256 (SEC1) public key; empty clears the key (disables deposit-proof enforcement).
  bytes deposit_pubkey = 3;
}

message MsgSetInstitutionDepositKeyResponse {
  bool executed    = 1;
  uint32 approvals = 2;
  uint32 threshold = 3;
}

// --- fx institution onboarding (§3 currency-institution model, §14 bootstrap) ---

// MsgRequestFxEntry: an exchange applies to join the network, naming an active financial
// institution as its guarantor. Signer = the applicant exchange admin.
message MsgRequestFxEntry {
  option (cosmos.msg.v1.signer) = "applicant";
  option (amino.name) = "phi/institutions/MsgRequestFxEntry";

  string applicant    = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"]; // exchange admin
  string fx_id        = 2; // requested exchange id, e.g. "exchange-1"
  string license      = 3; // exchange license reference
  string guarantor_id = 4; // id of the guaranteeing (active financial) institution
}

message MsgRequestFxEntryResponse {}

// MsgGuaranteeFxEntry: the guarantor financial institution's admin approves or declines.
message MsgGuaranteeFxEntry {
  option (cosmos.msg.v1.signer) = "guarantor_admin";
  option (amino.name) = "phi/institutions/MsgGuaranteeFxEntry";

  string guarantor_admin = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string fx_id           = 2;
  bool   approve         = 3; // true = guarantee, false = decline (clears the request)
}

message MsgGuaranteeFxEntryResponse {}

// MsgFinalizeFxEntry: finalizes onboarding. During the bootstrap phase the operator may finalize
// directly; otherwise proposal_id must reference a PASSED public (one-human-one-vote) x/gov proposal.
// On success the exchange is registered as an INSTITUTION_TYPE_FX institution.
message MsgFinalizeFxEntry {
  option (cosmos.msg.v1.signer) = "operator";
  option (amino.name) = "phi/institutions/MsgFinalizeFxEntry";

  string operator    = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string fx_id       = 2;
  uint64 proposal_id = 3; // passed x/gov proposal id; 0 only allowed during bootstrap
}

message MsgFinalizeFxEntryResponse {}
